name: Best Buy Open-Box Checker

on:
  schedule:
    # GitHub Actions minimum schedule interval is every 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-open-box:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: open-box-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            open-box-state-${{ github.ref_name }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Best Buy open-box stock
        env:
          # Non-sensitive defaults for this tracked item (can be overridden via repo Variables).
          BESTBUY_PRODUCT_URL: ${{ vars.BESTBUY_PRODUCT_URL || 'https://www.bestbuy.com/product/asus-rog-flow-z13-13-4-2-5k-180hz-touch-screen-gaming-laptop-copilot-pc-amd-ryzen-ai-max-395-128gb-ram-1tb-ssd-off-black/JJGGLHC84R/sku/6629541' }}
          BESTBUY_SKU: ${{ vars.BESTBUY_SKU || '6629541' }}

          # Sensitive values MUST stay in Secrets.
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_SMTP_APP_PASSWORD: ${{ secrets.GMAIL_SMTP_APP_PASSWORD }}
          NOTIFY_TO_EMAIL: ${{ secrets.NOTIFY_TO_EMAIL }}
          NOTIFY_FROM_EMAIL: ${{ secrets.NOTIFY_FROM_EMAIL }}

          REMINDER_MINUTES: ${{ vars.REMINDER_MINUTES }}
          STATE_FILE: .state/open_box_state.json
        run: python scripts/check_open_box.py

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: open-box-state-${{ github.ref_name }}-${{ github.run_id }}
